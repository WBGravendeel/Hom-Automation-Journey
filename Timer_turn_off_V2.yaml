blueprint:
  name: Auto Turn-Off After Duration V2
  description: >
    Turns a light (or any target) off automatically a set time after it
    was turned on — regardless of what turned it on (button, app, wall
    switch, etc). If the light is turned on again before the timer
    finishes, the timer restarts from zero. If the light is already off
    when the timer finishes, nothing happens.
  domain: automation
  input:
    target_light:
      name: Light(s) to auto-off
      selector:
        entity:
          domain:
            - light
          multiple: true

    auto_off_duration:
      name: Auto-off duration
      description: How long after turning on before the light turns off again.
      default:
        minutes: 30
      selector:
        duration: {}

    notify_target:
      name: Notify Target
      selector:
        entity:
          filter:
            domain: notify
          multiple: true


    notification:
      name: Notification on auto-off
      description: Notification to be sent once the light is turned off
      default: >-
        {{ target_light | map('state_attr', 'friendly_name') | join(', ') }} will be turned off soon.
      selector:
        text:

variables:
  target_light: !input target_light
  notification: !input notification
  auto_off_duration: !input auto_off_duration
  half_duration_seconds: >-
    {{ (auto_off_duration.hours | default(0) | int * 3600)
       + (auto_off_duration.minutes | default(0) | int * 60)
       + (auto_off_duration.seconds | default(0) | int) }}

trigger:
  - platform: state
    entity_id: !input target_light
    to: "on"

action:
  - delay: "{{ half_duration_seconds / 2 }}"
  - action: notify.send_message
    target:
      entity_id: !input notify_target
    data:
      title: "Automated turn-off"
      message: "{{ notification }}"
  - delay: "{{ half_duration_seconds / 2 }}"
  - service: light.turn_off
    target:
      entity_id: !input target_light


mode: restart
